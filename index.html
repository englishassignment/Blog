<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AEC Blog | Student Gallery</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#F6F4F1">
<link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <div class="logo" onclick="window.showView('home')">
                <i data-lucide="graduation-cap"></i> AEC<b>Blog</b>
            </div>
            <div class="nav-links">
                <button class="nav-btn" onclick="window.showView('home')">
                    <i data-lucide="layout-grid"></i> <span>Feed</span>
                </button>
                <button class="nav-btn" onclick="window.openAdminModal()">
                    <i data-lucide="shield-check"></i> <span>Teacher</span>
                </button>
                <button class="nav-btn primary" onclick="window.prepareNewPost()">
                    <i data-lucide="plus-circle"></i> <span>Submit Work</span>
                </button>
            </div>
        </div>
    </nav>

    <main class="container">
<section id="home-view" class="view">
            <div class="hero">
                <div class="badge">English</div>
                <h1>Blog Assignment</h1>
                <p>AEC ASSIGNMENT WEBSITE</p>
            </div>
            <div id="posts-container" class="feed-grid"></div>
        </section>

        <section id="submit-view" class="view" style="display: none;">
            <div class="submit-container-pro">
                <header class="submit-header-banner">
                    <i data-lucide="pen-tool" size="40"></i>
                    <h2>New Submission</h2>
                </header>

                <div class="submit-form-body">
                    <div class="form-card-section">
                        <div class="section-label"><i data-lucide="user" size="14"></i> 1. Student Identity</div>
                        <input type="text" id="postAuthor" class="input-pro" placeholder="Primary Student Name">
                        <div id="partner-container"></div>
                        <button class="add-btn-sm" onclick="window.addInput('partner-container', 'partner-input', 'Add Partner Name')">
                            <i data-lucide="user-plus" size="14"></i> Add Partner Name
                        </button>
                    </div>

                    <div class="form-card-section">
                        <div class="section-label"><i data-lucide="help-circle" size="14"></i> 2. The Question</div>
                        <textarea id="postQuestion" class="input-pro" rows="2" placeholder="Paste the problem statement here..."></textarea>
                    </div>

                    <div class="form-card-section">
                        <div class="section-label"><i data-lucide="type" size="14"></i> 3. Project Title</div>
                        <input type="text" id="postTitle" class="input-pro" placeholder="Enter Project Title">
                    </div>

                    <div class="form-card-section">
                        <div class="section-label"><i data-lucide="layers" size="14"></i> 4. Documentation</div>
                        <div id="content-blocks"></div>
                        <button class="btn-ghost-add" onclick="window.addContentBlock()">+ Add Section</button>
                    </div>

                    <div class="form-card-section">
                        <div class="section-label"><i data-lucide="link" size="14"></i> 5. Visuals & Links</div>
                        <div id="image-container"></div>
                        <button class="add-btn-sm btn-image-accent" onclick="window.addInput('image-container', 'image-input', 'Image URL')">
                            <i data-lucide="image" size="14"></i> Add Image
                        </button>
                        <div id="ref-container" style="margin-top:10px;"></div>
                        <button class="add-btn-sm btn-link-accent" onclick="window.addInput('ref-container', 'ref-input', 'Reference URL')">
                            <i data-lucide="external-link" size="14"></i> Add Source Link
                        </button>
                    </div>

                    <div style="display: flex; gap: 12px; margin-top: 20px;">
                        <button id="submitBtn" class="publish-btn">Publish to Blog</button>
                        <button class="nav-btn" onclick="window.showView('home')" style="flex:1; justify-content:center; border:1px solid #e2e8f0;">Cancel</button>
                    </div>
                </div>
            </div>
        </section>
                     
    </main>
        <div id="admin-modal" class="modal-overlay" style="display: none;">
    <div class="modal-card">
        <div class="modal-header">
            <h3><i data-lucide="shield-check"></i> Teacher Access</h3>
            <button onclick="window.closeAdminModal()" class="close-x">&times;</button>
        </div>
        <div class="modal-body">
            <label for="adminPass">Verification Required</label>
            <input type="password" id="adminPass" class="input-pro" placeholder="Enter Teacher Password...">
            <button onclick="window.verifyAdmin()" class="auth-btn">
                Unlock Dashboard
            </button>
        </div>
    </div>
        </div>
    
<div id="copyright" align="center">
    &copy;  2026 Athul Studio - All Rights Reserved.
</div>
<script>
(() => {
    const copyrightElement = document.getElementById("copyright");
    copyrightElement.innerHTML = "&copy;  "+new Date().getFullYear()+" Athul Studio - All Rights Reserved.";
})();
</script>
    <script>
let deferredPrompt;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  deferredPrompt = e;

  const installBtn = document.createElement("button");
  installBtn.innerText = "Install App";
  document.body.appendChild(installBtn);

  installBtn.addEventListener("click", () => {
    deferredPrompt.prompt();
    deferredPrompt.userChoice.then(choice => {
      if (choice.outcome === "accepted") {
        console.log("User installed app");
      }
      deferredPrompt = null;
    });
  });
});
    </script>
    <script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("service-worker.js")
      .then(() => console.log("Service Worker Registered"))
      .catch(err => console.log("SW Error:", err));
  }
    </script>
    <script type="module" src="app.js"></script>
    <script>window.onload = () => lucide.createIcons();</script>
</body>
</html>
